services:
  - type: web
    name: groweasy-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_BATCH_SIZE
        value: 20
      - key: AI_MAX_CONCURRENCY
        value: 2
      - key: AI_MAX_RETRIES
        value: 3
      - key: ALLOWED_ORIGINS
        sync: false
